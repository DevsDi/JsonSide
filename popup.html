<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JSON Formatter</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #1e1e1e;
      --bg-head: #252526;
      --text: #d4d4d4;
      --muted: #6a9955;
      --border: #3c3c3c;
      --accent: #0e639c;
      --green: #4caf50;
    }
    body {
      font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 20px;
    }
    h1 { font-size: 24px; margin-bottom: 16px; }
    .toolbar {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
      flex-wrap: wrap;
      align-items: center;
    }
    select, button, input {
      background: var(--bg-head);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 12px;
      border-radius: 4px;
      font-size: 14px;
      cursor: pointer;
    }
    button:hover { background: var(--accent); }
    button.primary { background: var(--accent); }
    .main {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      height: calc(100vh - 120px);
    }
    .panel {
      display: flex;
      flex-direction: column;
    }
    .panel-label {
      font-size: 13px;
      color: #888;
      margin-bottom: 6px;
    }
    textarea {
      flex: 1;
      background: var(--bg-head);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 12px;
      font-family: Consolas, monospace;
      font-size: 13px;
      resize: none;
      border-radius: 4px;
    }
    textarea:focus { outline: none; border-color: var(--accent); }
    .output {
      flex: 1;
      background: var(--bg-head);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 12px;
      overflow: auto;
      font-family: Consolas, monospace;
      font-size: 13px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .output .v-key { color: #9cdcfe; }
    .output .v-string { color: #ce9178; }
    .output .v-number { color: #b5cea8; }
    .output .v-bool { color: #569cd6; }
    .output .v-null { color: #569cd6; font-style: italic; }
    .output .v-bracket { color: #ffd700; font-weight: bold; }
    .output .v-comma { color: var(--text); }
    .output .v-count { color: var(--muted); font-size: 12px; margin-left: 4px; }
    .output .toggle { cursor: pointer; font-size: 10px; color: #888; }
    .output .toggle:hover { color: var(--text); }
    .output .block { padding-left: 16px; border-left: 1px dashed #333; margin-left: 6px; }
    .output .block.hide { display: none; }
    .output .line { display: block; }
    .output .v-ts { cursor: pointer; border-bottom: 1px dashed #b5cea8; }
    .output .v-ts.formatted { color: #ce9178; border-bottom-style: solid; }
    .error { color: #f48771; padding: 12px; }
    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--green);
      color: #fff;
      padding: 10px 20px;
      border-radius: 4px;
      display: none;
    }
    /* 模式切换按钮 */
    .mode-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 16px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s;
    }
    .mode-btn:hover { background: var(--bg-head); }
    .mode-btn.active { background: var(--accent); border-color: var(--accent); }
    .divider { width: 1px; height: 24px; background: var(--border); margin: 0 8px; }
    /* Diff 模式 */
    .diff-toolbar { display: flex; align-items: center; gap: 8px; }
    .diff-toolbar span { flex: 1; }
    .small-btn { padding: 4px 10px; font-size: 12px; }
    .primary-btn { background: var(--accent); }
    /* Diff 高亮 */
    .diff-add { background: rgba(76, 175, 50, 0.6); border-left: 4px solid #4caf50; }
    .diff-del { background: rgba(244, 67, 54, 0.6); border-left: 4px solid #f44336; }
    .diff-mod { background: rgba(255, 152, 0, 0.6); border-left: 4px solid #ff9800; }
    .diff-count-add { color: #4caf50; font-weight: bold; }
    .diff-count-del { color: #f44336; font-weight: bold; }
    .diff-count-mod { color: #ff9800; font-weight: bold; }
    .diff-summary {
      padding: 6px 10px;
      margin-bottom: 8px;
      background: rgba(255,255,255,0.05);
      border-radius: 4px;
      font-size: 12px;
      display: flex;
      gap: 16px;
    }
    .diff-summary span { display: flex; align-items: center; gap: 4px; }
    .diff-count-add { color: #4caf50; font-weight: bold; }
    .diff-count-del { color: #f44336; font-weight: bold; }
    .diff-count-mod { color: #ff9800; font-weight: bold; }
    /* 历史记录侧边栏 */
    .history-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.5);
      z-index: 999;
      transition: opacity 0.3s;
    }
    .history-overlay.show {
      display: block;
    }
    .history-drawer {
      position: fixed;
      top: 0;
      right: -400px;
      width: 400px;
      height: 100%;
      background: var(--bg-head);
      border-left: 1px solid var(--border);
      z-index: 1000;
      display: flex;
      flex-direction: column;
      transition: right 0.3s ease;
      box-shadow: -4px 0 20px rgba(0,0,0,0.3);
    }
    .history-drawer.show {
      right: 0;
    }
    .history-drawer-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px;
      border-bottom: 1px solid var(--border);
      font-size: 16px;
      font-weight: bold;
      color: var(--text);
      background: var(--bg);
    }
    .history-drawer-toolbar {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
    }
    .history-drawer-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }
    .history-item {
      display: flex;
      align-items: center;
      padding: 12px 16px;
      cursor: pointer;
      transition: background 0.2s;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .history-item:hover {
      background: rgba(255,255,255,0.05);
    }
    .history-icon {
      margin-right: 12px;
      font-size: 18px;
    }
    .history-icon.right-click { color: var(--accent); }
    .history-icon.manual { color: var(--muted); }
    .history-content {
      flex: 1;
      overflow: hidden;
    }
    .history-preview {
      font-family: Consolas, monospace;
      font-size: 12px;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .history-meta {
      font-size: 11px;
      color: #666;
      margin-top: 4px;
      display: flex;
      gap: 12px;
    }
    .history-time {
      color: var(--muted);
    }
    .history-source {
      color: #888;
    }
    .history-delete {
      padding: 4px 8px;
      font-size: 11px;
      color: #888;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 4px;
      cursor: pointer;
      opacity: 0;
      transition: all 0.2s;
    }
    .history-item:hover .history-delete {
      opacity: 1;
    }
    .history-delete:hover {
      color: #f44336;
      border-color: #f44336;
    }
    .history-empty {
      padding: 40px 20px;
      text-align: center;
      color: #666;
      font-size: 14px;
    }
    /* 转换模式 */
    .convert-output {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--bg-head);
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
    }
    .convert-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
    }
    .convert-tab {
      padding: 8px 16px;
      background: transparent;
      border: none;
      color: #888;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s;
      border-bottom: 2px solid transparent;
    }
    .convert-tab:hover {
      color: var(--text);
    }
    .convert-tab.active {
      color: var(--text);
      border-bottom-color: var(--accent);
    }
    .convert-result {
      flex: 1;
      padding: 12px;
      overflow: auto;
      font-family: Consolas, monospace;
      font-size: 13px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <h1>JSON Formatter</h1>
  <div class="toolbar">
    <button id="modeFormatBtn" class="mode-btn active">格式化</button>
    <button id="modeDiffBtn" class="mode-btn">Diff</button>
    <button id="modeConvertBtn" class="mode-btn">转换</button>
    <span class="divider"></span>
    <button id="historyBtn" class="mode-btn">历史</button>
    <span class="divider"></span>
    <select id="tzSelect">
      <option value="12">UTC+12 奥克兰</option>
      <option value="11">UTC+11 所罗门</option>
      <option value="10">UTC+10 悉尼</option>
      <option value="9">UTC+9 东京</option>
      <option value="8" selected>UTC+8 北京</option>
      <option value="7">UTC+7 曼谷</option>
      <option value="6">UTC+6 达卡</option>
      <option value="5">UTC+5 卡拉奇</option>
      <option value="4">UTC+4 迪拜</option>
      <option value="3">UTC+3 莫斯科</option>
      <option value="2">UTC+2 开罗</option>
      <option value="1">UTC+1 巴黎</option>
      <option value="0">UTC+0 伦敦</option>
      <option value="-1">UTC-1 亚速尔</option>
      <option value="-2">UTC-2 中大西洋</option>
      <option value="-3">UTC-3 圣保罗</option>
      <option value="-4">UTC-4 智利</option>
      <option value="-5">UTC-5 纽约</option>
      <option value="-6">UTC-6 芝加哥</option>
      <option value="-7">UTC-7 丹佛</option>
      <option value="-8">UTC-8 洛杉矶</option>
      <option value="-9">UTC-9 阿拉斯加</option>
      <option value="-10">UTC-10 夏威夷</option>
    </select>
    <button id="formatBtn" class="primary">格式化</button>
    <button id="formatTsBtn">时间格式化</button>
    <button id="expandBtn">全部展开</button>
    <button id="collapseBtn">全部收起</button>
    <button id="copyBtn">复制结果</button>
    <button id="clearBtn">清空</button>
  </div>
  <!-- 格式化模式 -->
  <div id="formatMode" class="main">
    <div class="panel">
      <div class="panel-label">输入 JSON</div>
      <textarea id="input" placeholder='粘贴 JSON，如：{"name": "test", "time": 1717147200000}'></textarea>
    </div>
    <div class="panel">
      <div class="panel-label">格式化结果</div>
      <div class="output" id="output"></div>
    </div>
  </div>
  <!-- Diff 模式 -->
  <div id="diffMode" class="main" style="display: none;">
    <div class="panel">
      <div class="panel-label diff-toolbar">
        <span>JSON A</span>
        <button id="swapBtn" class="small-btn">交换</button>
      </div>
      <div class="output" id="diffOutputA" contenteditable="true" spellcheck="false"></div>
    </div>
    <div class="panel">
      <div class="panel-label diff-toolbar">
        <span>JSON B <span id="diffStats"></span></span>
        <button id="compareBtn" class="small-btn primary-btn">Compare</button>
        <button id="clearDiffBtn" class="small-btn">Clear</button>
      </div>
      <div class="output" id="diffOutputB" contenteditable="true" spellcheck="false"></div>
    </div>
  </div>
  <!-- 转換模式 -->
  <div id="convertMode" class="main" style="display: none;">
    <div class="panel">
      <div class="panel-label diff-toolbar">
        <span>JSON 输入</span>
        <button id="clearConvertBtn" class="small-btn">清空</button>
      </div>
      <textarea id="convertInput" placeholder='粘贴 JSON，如：{"name": "test", "age": 18}'></textarea>
    </div>
    <div class="panel">
      <div class="panel-label diff-toolbar">
        <span>转换结果</span>
        <button id="copyConvertBtn" class="small-btn">复制</button>
      </div>
      <div class="convert-output" id="convertOutput">
        <div class="convert-tabs">
          <button class="convert-tab active" data-type="typescript">TypeScript</button>
          <button class="convert-tab" data-type="go">Go struct</button>
          <button class="convert-tab" data-type="yaml">YAML</button>
        </div>
        <div class="convert-result" id="convertResult"></div>
      </div>
    </div>
  </div>
  <!-- 历史记录侧边栏 -->
  <div id="historyPanel" class="history-drawer">
    <div class="history-drawer-header">
      <span>历史记录</span>
      <button id="closeHistoryBtn" class="small-btn">关闭</button>
    </div>
    <div class="history-drawer-toolbar">
      <button id="clearAllHistoryBtn" class="small-btn">清空全部</button>
    </div>
    <div class="history-drawer-list" id="historyList"></div>
  </div>
  <div id="historyOverlay" class="history-overlay"></div>
  <div class="toast" id="toast">已复制到剪贴板</div>

  <script src="popup.js"></script>
</body>
</html>
