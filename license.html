<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Activate JSON Side Pro</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
      background: #1e1e1e;
      color: #d4d4d4;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      background: #252526;
      border: 1px solid #3c3c3c;
      border-radius: 12px;
      padding: 32px;
      width: 420px;
      text-align: center;
    }
    .icon {
      font-size: 48px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 24px;
      margin-bottom: 8px;
    }
    .subtitle {
      color: #888;
      margin-bottom: 24px;
      font-size: 14px;
    }
    input {
      width: 100%;
      padding: 12px;
      background: #1e1e1e;
      border: 1px solid #3c3c3c;
      border-radius: 6px;
      color: #d4d4d4;
      font-size: 16px;
      font-family: Consolas, monospace;
      text-align: center;
      letter-spacing: 1px;
      margin-bottom: 16px;
    }
    input:focus {
      outline: none;
      border-color: #0e639c;
    }
    input::placeholder {
      color: #666;
    }
    button {
      width: 100%;
      padding: 12px;
      background: #0e639c;
      border: none;
      border-radius: 6px;
      color: #fff;
      font-size: 14px;
      cursor: pointer;
      margin-bottom: 12px;
    }
    button:hover { background: #1177bb; }
    button:disabled { background: #3c3c3c; cursor: not-allowed; }
    button.primary {
      background: linear-gradient(135deg, #4caf50 0%, #2e7d32 100%);
      font-size: 16px;
      font-weight: 600;
      padding: 14px;
      margin-bottom: 16px;
      box-shadow: 0 4px 12px rgba(76, 175, 80, 0.3);
      transition: all 0.2s ease;
    }
    button.primary:hover {
      background: linear-gradient(135deg, #5cbf60 0%, #3e8d42 100%);
      box-shadow: 0 6px 16px rgba(76, 175, 80, 0.4);
      transform: translateY(-1px);
    }
    button.primary:disabled {
      background: #3c3c3c;
      box-shadow: none;
      transform: none;
    }
    button.secondary {
      background: transparent;
      border: 1px solid #3c3c3c;
      color: #888;
    }
    button.secondary:hover {
      background: #3c3c3c;
      color: #d4d4d4;
    }
    .result {
      margin-top: 16px;
      padding: 12px;
      border-radius: 6px;
      font-size: 14px;
      display: none;
    }
    .success {
      background: rgba(76,175,50,0.2);
      color: #4caf50;
      border: 1px solid #4caf50;
    }
    .error {
      background: rgba(244,67,54,0.2);
      color: #f44336;
      border: 1px solid #f44336;
    }
    .footer {
      margin-top: 24px;
      padding-top: 16px;
      border-top: 1px solid #3c3c3c;
      font-size: 12px;
      color: #666;
    }
    .footer a {
      color: #0e639c;
      text-decoration: none;
    }
    .footer a:hover {
      text-decoration: underline;
    }
    .pro-status {
      margin-top: 16px;
      padding: 16px;
      background: rgba(76,175,50,0.1);
      border: 1px solid #4caf50;
      border-radius: 6px;
      display: none;
    }
    .pro-status.active {
      display: block;
    }
    .pro-status .status-icon {
      color: #4caf50;
      font-size: 32px;
      margin-bottom: 8px;
    }
    .pro-status .status-text {
      color: #4caf50;
      font-size: 16px;
      margin-bottom: 12px;
    }
    .license-info {
      margin-top: 12px;
      padding: 12px;
      background: rgba(0,0,0,0.2);
      border-radius: 4px;
      text-align: left;
      font-size: 12px;
    }
    .license-info .row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 6px;
    }
    .license-info .label {
      color: #888;
    }
    .license-info .value {
      color: #d4d4d4;
      font-family: Consolas, monospace;
    }
    .divider {
      display: flex;
      align-items: center;
      margin: 16px 0;
      color: #666;
      font-size: 12px;
    }
    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      border-bottom: 1px solid #3c3c3c;
    }
    .divider span {
      padding: 0 12px;
    }
    .tip {
      margin-top: 12px;
      padding: 8px;
      background: rgba(255,193,7,0.1);
      border: 1px solid rgba(255,193,7,0.3);
      border-radius: 4px;
      font-size: 11px;
      color: #ffc107;
      text-align: left;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">⭐</div>
    <h1>Activate Diff Pro</h1>
    <p class="subtitle">Enter your license key</p>

    <div id="inputArea">
      <input type="text" id="licenseInput" placeholder="JSIDE-XXXX-XXXX-XXXX" maxlength="20">
      <button id="activateBtn" class="primary">Activate</button>
    </div>

    <div id="proStatus" class="pro-status">
      <div class="status-icon">✓</div>
      <div class="status-text">Diff Pro Activated</div>
      <div class="license-info">
        <div class="row">
          <span class="label">License</span>
          <span class="value" id="displayKey">-</span>
        </div>
        <div class="row">
          <span class="label">Activated</span>
          <span class="value" id="displayDate">-</span>
        </div>
      </div>
      <button id="changeFileBtn" class="secondary" style="margin-top:12px;">Reactivate</button>
    </div>

    <div id="result" class="result"></div>

    <div class="footer">
      Don't have a license? <a href="https://jsonside.com/buy" target="_blank">Buy Now</a>
    </div>
  </div>

  <script src="license.js"></script>
</body>
</html>
